<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#18181b"/>
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27272a" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Green accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#16a34a"/>
  <!-- Logo mark -->
  <rect x="80" y="200" width="56" height="56" rx="12" fill="#16a34a"/>
  <text x="108" y="241" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle">P</text>
  <!-- Title -->
  <text x="80" y="310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="#fafafa" letter-spacing="-1">PermaDrop</text>
  <!-- Subtitle -->
  <text x="80" y="368" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" fill="#a1a1aa">Archive Word documents to perma.cc</text>
  <text x="80" y="406" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" fill="#a1a1aa">Permanent links for legal scholarship</text>
  <!-- Tags -->
  <rect x="80" y="450" width="148" height="36" rx="18" fill="#27272a"/>
  <text x="154" y="473" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#a1a1aa" text-anchor="middle">Free &amp; Open Source</text>
  <rect x="244" y="450" width="152" height="36" rx="18" fill="#27272a"/>
  <text x="320" y="473" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#a1a1aa" text-anchor="middle">Browser-based</text>
  <rect x="412" y="450" width="142" height="36" rx="18" fill="#27272a"/>
  <text x="483" y="473" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#a1a1aa" text-anchor="middle">No upload</text>
  <!-- URL -->
  <text x="80" y="570" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#52525b">permadrop.kirinchang.com</text>
</svg>
